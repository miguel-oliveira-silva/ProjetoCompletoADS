#cloud-config


package_update: true
package_upgrade: true

packages:
  - git
  - curl
  - ca-certificates
  - gnupg
  - apt-transport-https

write_files:
  
  
  
  
  
  - path: /opt/forma/bootstrap.sh
    permissions: '0755'
    content: |
      __BOOTSTRAP_SCRIPT__

  
  
  
  
  - path: /etc/systemd/system/forma-bootstrap.service
    permissions: '0644'
    content: |
      [Unit]
      Description=Forma - Bootstrap da aplicacao (clone + docker compose up)
      After=network-online.target docker.service
      Wants=network-online.target

      [Service]
      Type=oneshot
      ExecStart=/opt/forma/bootstrap.sh
      RemainAfterExit=true
      TimeoutStartSec=900

      [Install]
      WantedBy=multi-user.target

runcmd:
  - mkdir -p /opt/forma
  - systemctl daemon-reload
  - systemctl enable forma-bootstrap.service
  - systemctl start forma-bootstrap.service

final_message: "Forma: cloud-init finalizado em $UPTIME segundos. Veja /var/log/forma-bootstrap.log para detalhes do deploy da aplicação."
