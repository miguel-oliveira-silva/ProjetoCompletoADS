# Configuração do user-service para produção com Docker
# 
# Os valores vêm de variáveis de ambiente definidas no docker-compose.yml
# Os valores após ":" são defaults para rodar localmente

spring:

  application:
    name: user-service

  # =======================================================================
  # BANCO DE DADOS — PostgreSQL (substitui o H2 em memória)
  # =======================================================================
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:userdb}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USER:forma}
    password: ${DB_PASSWORD:forma}
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      # "update" em produção: cria/atualiza tabelas sem apagar dados a cada start
      # (no H2 em memória usávamos create-drop, pois os dados eram descartáveis)
      ddl-auto: update
    properties:
      hibernate:
        show_sql: false
        format_sql: true

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        acknowledge-mode: auto
        retry:
          enabled: true
          max-attempts: 3

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.markovitz: INFO
    org.hibernate.SQL: WARN
